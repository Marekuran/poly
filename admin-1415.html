<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PredictX — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #060a0f;
            --surface: #0d1420;
            --surface2: #111d2e;
            --border: #1a2840;
            --border2: #1f3050;
            --text: #e2eaf5;
            --muted: #4a6080;
            --green: #00d964;
            --green-dim: #00d96420;
            --red: #ff4466;
            --red-dim: #ff446620;
            --blue: #3b82f6;
            --yellow: #f5a623;
        }

        body {
            font-family: 'DM Sans',sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 340px;
            box-shadow: 0 0 60px rgba(255,68,102,.08);
        }

        .login-logo {
            font-family: 'Space Mono',monospace;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--red);
            margin-bottom: 8px
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px
        }

        .login-sub {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 28px;
            font-family: 'Space Mono',monospace
        }

        .login-field {
            margin-bottom: 14px
        }

            .login-field label {
                display: block;
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 5px;
                font-family: 'Space Mono',monospace;
                letter-spacing: .5px
            }

            .login-field input {
                width: 100%;
                padding: 11px 14px;
                background: var(--surface2);
                border: 1px solid var(--border2);
                border-radius: 10px;
                color: var(--text);
                font-family: 'DM Sans',sans-serif;
                font-size: 14px;
                outline: none;
                transition: border-color .2s
            }

                .login-field input:focus {
                    border-color: var(--blue)
                }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: var(--red);
            color: #fff;
            font-family: 'DM Sans',sans-serif;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            transition: all .15s
        }

            .login-btn:hover {
                background: #e0003a;
                transform: translateY(-1px)
            }

        .login-err {
            color: var(--red);
            font-size: 12px;
            margin-top: 10px;
            font-family: 'Space Mono',monospace;
            display: none
        }

        header {
            background: rgba(6,10,15,.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-family: 'Space Mono',monospace;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--red)
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .admin-badge {
            font-family: 'Space Mono',monospace;
            font-size: 10px;
            letter-spacing: 1px;
            background: var(--red-dim);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-family: 'Space Mono',monospace;
            cursor: pointer;
            transition: all .15s
        }

            .logout-btn:hover {
                border-color: var(--red);
                color: var(--red)
            }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media(max-width:600px) {
            .main {
                grid-template-columns: 1fr
            }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden
        }

        .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: 'Space Mono',monospace;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

            .panel-header .count {
                background: var(--surface2);
                border: 1px solid var(--border2);
                border-radius: 20px;
                padding: 2px 10px;
                font-size: 10px;
                color: var(--text);
            }

        .panel-body {
            padding: 16px
        }

        .field {
            margin-bottom: 12px
        }

            .field label {
                display: block;
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 5px;
                letter-spacing: .5px;
                font-family: 'Space Mono',monospace
            }

            .field input, .field textarea {
                width: 100%;
                padding: 10px 12px;
                background: var(--surface2);
                border: 1px solid var(--border2);
                border-radius: 10px;
                color: var(--text);
                font-family: 'DM Sans',sans-serif;
                font-size: 14px;
                transition: border-color .2s;
                outline: none
            }

                .field input:focus, .field textarea:focus {
                    border-color: var(--blue)
                }

            .field textarea {
                resize: vertical;
                min-height: 70px
            }

            .field input[type="datetime-local"] {
                color-scheme: dark
            }

        .deadline-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            font-family: 'Space Mono',monospace
        }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans',sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all .15s
        }

        .btn-primary {
            background: var(--blue);
            color: #fff
        }

            .btn-primary:hover {
                background: #2563eb;
                transform: translateY(-1px)
            }

        .btn:active {
            transform: scale(.98)
        }

        .m-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            animation: fadeIn .3s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .m-card:last-child {
            margin-bottom: 0
        }

        .m-q {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px
        }

        .m-creator {
            font-size: 10px;
            font-family: 'Space Mono',monospace;
            color: var(--yellow);
            margin-bottom: 4px
        }

        .m-deadline {
            font-size: 11px;
            font-family: 'Space Mono',monospace;
            color: var(--muted);
            margin-bottom: 8px
        }

            .m-deadline.urgent {
                color: var(--red)
            }

            .m-deadline.soon {
                color: var(--yellow)
            }

        .m-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-family: 'Space Mono',monospace;
            font-size: 10px
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 10px;
            flex: 1;
            text-align: center
        }

            .stat .val {
                font-size: 13px;
                font-weight: 700;
                display: block;
                margin-top: 2px
            }

            .stat .val-yes {
                color: var(--green)
            }

            .stat .val-no {
                color: var(--red)
            }

            .stat .val-vol {
                color: var(--yellow)
            }

        .m-bar-wrap {
            height: 5px;
            background: var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px
        }

        .m-bar-fill {
            height: 100%;
            background: linear-gradient(90deg,var(--green),#00ff88);
            border-radius: 20px;
            transition: width .5s
        }

        .m-actions {
            display: flex;
            gap: 6px
        }

        .m-btn {
            flex: 1;
            padding: 7px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans',sans-serif;
            font-weight: 600;
            font-size: 12px;
            transition: all .15s
        }

        .m-btn-yes {
            background: var(--green-dim);
            border: 1px solid var(--green);
            color: var(--green)
        }

            .m-btn-yes:hover {
                background: var(--green);
                color: #000
            }

        .m-btn-no {
            background: var(--red-dim);
            border: 1px solid var(--red);
            color: var(--red)
        }

            .m-btn-no:hover {
                background: var(--red);
                color: #fff
            }

        .m-btn-del {
            background: var(--surface);
            border: 1px solid var(--border2);
            color: var(--muted)
        }

            .m-btn-del:hover {
                border-color: var(--red);
                color: var(--red)
            }

        .closed-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-family: 'Space Mono',monospace;
            padding: 4px 12px;
            border-radius: 20px
        }

        .badge-yes {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid var(--green)
        }

        .badge-no {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid var(--red)
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .big-stat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px
        }

            .big-stat .label {
                font-size: 10px;
                letter-spacing: 1px;
                color: var(--muted);
                font-family: 'Space Mono',monospace
            }

            .big-stat .value {
                font-size: 20px;
                font-weight: 700;
                font-family: 'Space Mono',monospace;
                margin-top: 4px
            }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--muted);
            font-family: 'Space Mono',monospace;
            font-size: 11px
        }

        .full {
            grid-column: 1/-1
        }

        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--green);
            color: #000;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            transform: translateY(8px);
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 200
        }

            .notif.show {
                transform: translateY(0);
                opacity: 1
            }

        .locked-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-family: 'Space Mono',monospace;
            color: var(--yellow);
            background: rgba(245,166,35,.12);
            border: 1px solid var(--yellow);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-logo">⬤ PREDICTX</div>
            <div class="login-title">Admin Panel</div>
            <div class="login-sub">Přístup pouze pro administrátory</div>
            <div class="login-field">
                <label>Uživatelské jméno</label>
                <input id="login-user" type="text" placeholder="admin" autocomplete="username">
            </div>
            <div class="login-field">
                <label>Heslo</label>
                <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="login-btn" onclick="doLogin()">Přihlásit se →</button>
            <div class="login-err" id="login-err">❌ Špatné jméno nebo heslo</div>
        </div>
    </div>

    <header>
        <div class="logo">⬤ PREDICTX</div>
        <div class="header-right">
            <div class="admin-badge">ADMIN PANEL</div>
            <button class="logout-btn" onclick="doLogout()">Odhlásit</button>
        </div>
    </header>

    <div class="main">
        <div class="panel">
            <div class="panel-header">Vytvořit trh</div>
            <div class="panel-body">
                <div class="field">
                    <label>Otázka</label>
                    <textarea id="q" placeholder="Např: Bude Bitcoin nad $100k do konce roku?"></textarea>
                </div>
                <div class="field">
                    <label>Deadline (uzávěrka)</label>
                    <input id="deadline" type="datetime-local">
                    <div class="deadline-hint">Nechte prázdné = bez deadline</div>
                </div>
                <div class="field">
                    <label>Počáteční likvidita YES ($)</label>
                    <input id="startYes" type="number" value="50" min="0">
                </div>
                <div class="field">
                    <label>Počáteční likvidita NO ($)</label>
                    <input id="startNo" type="number" value="50" min="0">
                </div>
                <button class="btn btn-primary" onclick="create()">+ Vytvořit trh</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Přehled</div>
            <div class="panel-body">
                <div class="stats-grid">
                    <div class="big-stat"><div class="label">TRHY</div><div class="value" id="stat-total">0</div></div>
                    <div class="big-stat"><div class="label">AKTIVNÍ</div><div class="value" id="stat-active" style="color:var(--green)">0</div></div>
                    <div class="big-stat"><div class="label">CELK. OBJEM</div><div class="value" id="stat-vol" style="color:var(--yellow)">$0</div></div>
                    <div class="big-stat"><div class="label">UZAVŘENÉ</div><div class="value" id="stat-closed" style="color:var(--muted)">0</div></div>
                </div>
            </div>
        </div>

        <div class="panel full">
            <div class="panel-header">Trhy <span class="count" id="market-count">0</span></div>
            <div class="panel-body" id="list"><div class="empty-state">Zatím žádné trhy</div></div>
        </div>
    </div>

    <div class="notif" id="notif"></div>

    <script>
        // ─── AUTH CONFIG — tady pridavat hesla a nicky ───────────────────────────────────────────
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "predictx2025";
        // ───────────────────────────────────────────────────────────────────────

        function doLogin() {
            let u = document.getElementById("login-user").value.trim();
            let p = document.getElementById("login-pass").value;
            if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                sessionStorage.setItem("admin_auth", "1");
                document.getElementById("login-overlay").style.display = "none";
                render();
            } else {
                document.getElementById("login-err").style.display = "block";
                document.getElementById("login-pass").value = "";
            }
        }

        document.getElementById("login-user").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("login-pass").focus(); });
        document.getElementById("login-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

        function doLogout() {
            sessionStorage.removeItem("admin_auth");
            document.getElementById("login-overlay").style.display = "flex";
        }

        // Check session on load
        if (sessionStorage.getItem("admin_auth") === "1") {
            document.getElementById("login-overlay").style.display = "none";
        }

        const load = () => JSON.parse(localStorage.getItem("markets") || "[]");
        const save = m => localStorage.setItem("markets", JSON.stringify(m));
        let markets = load();

        function notify(msg, isErr) {
            let el = document.getElementById("notif");
            el.textContent = msg;
            el.style.background = isErr ? "var(--red)" : "var(--green)";
            el.style.color = isErr ? "#fff" : "#000";
            el.classList.add("show");
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove("show"), 2500);
        }

        window.create = function () {
            if (sessionStorage.getItem("admin_auth") !== "1") return;
            let q = document.getElementById("q").value.trim();
            if (!q) { notify("Zadej otázku!", true); return; }
            let sy = Number(document.getElementById("startYes").value) || 50;
            let sn = Number(document.getElementById("startNo").value) || 50;
            let dlVal = document.getElementById("deadline").value;
            let deadline = dlVal ? new Date(dlVal).getTime() : null;
            let m = load();
            m.push({
                id: Date.now(), q, yes: sy, no: sn,
                p: sy / (sy + sn),
                hist: [{ p: sy / (sy + sn), yes: sy, no: sn, t: Date.now() }],
                chat: [], closed: false, result: null,
                deadline: deadline,
                createdAt: Date.now(),
                creatorName: null,
                creatorFee: 0
            });
            save(m); markets = m;
            document.getElementById("q").value = "";
            document.getElementById("deadline").value = "";
            notify("Trh vytvořen! ✓");
            render();
        };

        window.closeMarket = function (id, res) {
            let m = load(), x = m.find(a => a.id == id);
            if (!x) return;
            x.closed = true; x.result = res;
            // Pay creator fee if applicable
            if (x.creatorName && x.creatorFee > 0) {
                let lb = JSON.parse(localStorage.getItem("leaderboard") || "[]");
                let creator = lb.find(e => e.name === x.creatorName);
                if (creator) {
                    creator.balance = (creator.balance || 0) + x.creatorFee;
                    localStorage.setItem("leaderboard", JSON.stringify(lb));
                }
            }
            save(m); markets = m;
            notify(`Trh uzavřen: ${res.toUpperCase()}`);
            render();
        };

        window.deleteMarket = function (id) {
            if (!confirm("Smazat tento trh?")) return;
            let m = load().filter(a => a.id != id);
            save(m); markets = m;
            notify("Trh smazán");
            render();
        };

        function dlInfo(deadline) {
            if (!deadline) return null;
            let diff = deadline - Date.now();
            if (diff <= 0) return { text: '⏱ EXPIRED — sázení uzavřeno', cls: 'urgent' };
            let d = Math.floor(diff / 86400000), h = Math.floor(diff / 3600000), mn = Math.floor((diff % 3600000) / 60000);
            if (d > 1) return { text: `⏱ ${d}d ${h % 24}h left`, cls: '' };
            if (h > 0) return { text: `⏱ ${h}h ${mn}m left`, cls: h < 6 ? 'soon' : '' };
            return { text: `⏱ ${mn}m left`, cls: 'urgent' };
        }

        function render() {
            markets = load();
            let active = markets.filter(m => !m.closed).length;
            let closed = markets.filter(m => m.closed).length;
            let vol = markets.reduce((s, m) => s + (m.yes || 0) + (m.no || 0), 0);
            document.getElementById("stat-total").textContent = markets.length;
            document.getElementById("stat-active").textContent = active;
            document.getElementById("stat-closed").textContent = closed;
            document.getElementById("stat-vol").textContent = "$" + vol.toFixed(0);
            document.getElementById("market-count").textContent = markets.length;
            let el = document.getElementById("list");
            if (!markets.length) { el.innerHTML = '<div class="empty-state">Zatím žádné trhy</div>'; return; }
            let sorted = [...markets].reverse();
            el.innerHTML = sorted.map(m => {
                let t = (m.yes || 0) + (m.no || 0), p = t ? m.yes / t : 0.5;
                let pYes = (p * 100).toFixed(1);
                let dl = dlInfo(m.deadline);
                let isExpired = m.deadline && Date.now() > m.deadline;
                let creatorInfo = m.creatorName ? `<div class="m-creator">👤 Vytvořil: ${m.creatorName} · poplatek: $${(m.creatorFee || 0).toFixed(2)}</div>` : '';
                return `<div class="m-card">
                        <div class="m-q">${m.q}${isExpired && !m.closed ? '<span class="locked-badge">⏱ LOCKED</span>' : ''}</div>
                        ${creatorInfo}
                        ${dl ? `<div class="m-deadline ${dl.cls}">${dl.text}</div>` : ''}
                        <div class="m-stats">
                            <div class="stat"><div class="label">YES pool</div><div class="val val-yes">$${(m.yes || 0).toFixed(1)}</div></div>
                            <div class="stat"><div class="label">NO pool</div><div class="val val-no">$${(m.no || 0).toFixed(1)}</div></div>
                            <div class="stat"><div class="label">Prob</div><div class="val val-yes">${pYes}%</div></div>
                            <div class="stat"><div class="label">Volume</div><div class="val val-vol">$${t.toFixed(0)}</div></div>
                        </div>
                        <div class="m-bar-wrap"><div class="m-bar-fill" style="width:${pYes}%"></div></div>
                        ${m.closed
                        ? `<span class="closed-badge ${m.result === "yes" ? "badge-yes" : "badge-no"}">✓ UZAVŘENO — ${m.result.toUpperCase()}</span>
                               <button class="m-btn m-btn-del" style="margin-top:8px;width:100%" onclick="deleteMarket(${m.id})">Smazat</button>`
                        : `<div class="m-actions">
                                <button class="m-btn m-btn-yes" onclick="closeMarket(${m.id},'yes')">✓ Resolve YES</button>
                                <button class="m-btn m-btn-no" onclick="closeMarket(${m.id},'no')">✗ Resolve NO</button>
                                <button class="m-btn m-btn-del" onclick="deleteMarket(${m.id})">🗑</button>
                               </div>`
                    }
                    </div>`;
            }).join("");
        }

        window.addEventListener("storage", e => { if (e.key === "markets") { markets = load(); render(); } });
        setInterval(() => { markets = load(); render(); }, 1500);
        render();
    </script>
</body>
</html>
